{% extends "layout_employees.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white border border-dashed border-gray-300 rounded-lg text-center">
    <h2 class="text-lg font-bold mb-4">Etiqueta de Trazabilidad</h2>
    
    <div class="bg-white p-4 inline-block border border-gray-200 mb-4">
        <img src="data:image/png;base64,{{ barcode_img }}" alt="GS1-128" class="max-w-full h-auto">
        <p class="text-[10px] mt-2 font-mono text-gray-600">
            (01){{ prod_id }}{{ pres_id }} (10){{ lote }}
        </p>
    </div>

    <div class="flex gap-2 justify-center no-print">
        <button onclick="window.print()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold text-sm">
            Imprimir Etiqueta
        </button>
        <a href="{{ url_for('products.products') }}" class="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg font-bold text-sm">
            Regresar
        </a>
    </div>
</div>

<style>
    @media print {
        .no-print { display: none; }
        body { background: white; }
        .max-w-md { border: none; margin: 0; padding: 0; }
    }
</style>
{% endblock %}
