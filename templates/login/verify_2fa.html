{% extends "layout_clients.html" %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl p-10 border border-slate-100">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-black text-[#243c60] uppercase">Verificación SMS</h2>
            <p class="text-slate-500 text-sm">Ingresa el código de 6 dígitos enviado a tu celular.</p>
        </div>
        
        <form action="{{ url_for('login.verify_otp') }}" method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="flex justify-center">
                <input type="text" name="otp_code" maxlength="6" required
                    class="w-full text-center text-4xl font-black tracking-[0.5rem] py-4 bg-[#f4faf5] border-2 border-transparent focus:border-[#9ec946] rounded-2xl outline-none transition-all"
                    placeholder="000000">
            </div>
            
            <button type="submit" 
                class="w-full bg-[#9ec946] text-[#243c60] py-4 rounded-2xl font-black text-lg shadow-xl hover:bg-[#8bb33d] transition-all">
                Verificar y Entrar
            </button>
            
            <div class="text-center mt-4">
                <a href="{{ url_for('login.login_client') }}" class="text-xs text-slate-400 hover:text-[#243c60]">Volver al inicio</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
