{% extends "layout_clients.html" %} {% block title %}Iniciar Sesión{% endblock
%} {% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="w-full max-w-md">
    <div
      class="bg-white rounded-[2.5rem] shadow-2xl shadow-[#243c60]/5 border border-slate-100 overflow-hidden"
    >
      <div class="bg-[#243c60] p-10 text-center relative overflow-hidden">
        <div
          class="absolute -right-10 -top-10 w-32 h-32 bg-[#9ec946]/20 rounded-full blur-2xl"
        ></div>
        <div class="relative z-10">
          <div
            class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"
          >
            <img
              class="w-10 h-10"
              src="{{url_for('static',filename='img/icons/logo.png')}}"
              alt="Logo"
            />
          </div>
          <h2 class="text-2xl font-black text-white uppercase tracking-tight">
            Bienvenido
          </h2>
          <p class="text-[#7dc6e9] text-sm font-bold">
            Acceso a CrystalControl
          </p>
        </div>
      </div>

      <div class="p-10">
        <form
          action="{{ url_for('login.login_client') }}"
          method="POST"
          class="space-y-6"
        >
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div>
            <label
              class="block text-[11px] font-black text-[#243c60] uppercase tracking-widest mb-2 ml-1"
              >Email</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"
              >
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                  />
                </svg>
              </span>
              <input
                type="email"
                name="email"
                required
                class="w-full pl-12 pr-4 py-4 bg-[#f4faf5] border-2 border-transparent focus:border-[#7dc6e9] focus:bg-white rounded-2xl outline-none transition-all text-[#243c60] font-medium placeholder:text-slate-400"
                placeholder="ejemplo@ejemplo.com"
              />
            </div>
          </div>

          <div>
            <label
              class="block text-[11px] font-black text-[#243c60] uppercase tracking-widest mb-2 ml-1"
              >Contraseña</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"
              >
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z"
                  />
                </svg>
              </span>
              <input
                type="password"
                name="password"
                required
                class="w-full pl-12 pr-4 py-4 bg-[#f4faf5] border-2 border-transparent focus:border-[#7dc6e9] focus:bg-white rounded-2xl outline-none transition-all text-[#243c60] font-medium placeholder:text-slate-400"
                placeholder="••••••••"
              />
            </div>
          </div>

          <div class="flex items-center justify-between text-xs font-bold">
            <label
              class="flex items-center gap-2 cursor-pointer text-slate-500 hover:text-[#243c60]"
            >
              <input
                type="checkbox"
                class="w-4 h-4 rounded border-slate-300 text-[#9ec946] focus:ring-[#9ec946]"
                name="remember"
              />
              Recordarme
            </label>
            <a
              href="#"
              class="text-[#7dc6e9] hover:text-[#243c60] transition-colors"
              >¿Olvidaste tu contraseña?</a
            >
          </div>

          <button
            type="submit"
            class="w-full bg-[#9ec946] text-[#243c60] py-4 rounded-2xl font-black text-lg shadow-xl shadow-[#9ec946]/20 hover:bg-[#8bb33d] hover:-translate-y-1 transition-all active:scale-95"
          >
            Entrar ahora
          </button>
        </form>

        <div class="mt-8 pt-8 border-t border-slate-100 text-center">
          <p class="text-sm text-slate-500 font-medium">
            ¿No tienes cuenta?
            <a
              href="{{ url_for('login.register') }}"
              class="text-[#243c60] font-black hover:text-[#9ec946] transition-colors ml-1"
              >Regístrate gratis</a
            >
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
