<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión Administrativa - CrystalControl</title>
    <link
      rel="stylesheet"
      href="{{url_for('static',filename='css/output.css')}}"
    />
  </head>
  <body class="bg-gray-100 h-screen flex items-center justify-center p-4">
    <div
      class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-gray-100"
    >
      <div class="flex flex-col items-center mb-8">
        <img
          src="{{ url_for('static', filename='img/logo.png') }}"
          alt="Logo CrystalControl"
          class="h-20 w-auto object-contain mb-4"
        />

        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tighter">
          CrystalControl
        </h1>
        <p
          class="text-sm text-slate-500 mt-1 uppercase tracking-wider font-semibold"
        >
          Panel Administrativo
        </p>
      </div>

      <div id="flash-container" class="mb-6">
        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %} {% for category, message in messages %}
        <div
          class="p-4 text-sm rounded-lg shadow-sm border-l-4 {% if category == 'danger' %} bg-red-50 text-red-700 border-red-500 {% elif category == 'success' %} bg-green-50 text-green-700 border-green-500 {% elif category == 'warning' %} bg-yellow-50 text-yellow-700 border-yellow-500 {% else %} bg-blue-50 text-blue-700 border-blue-500 {% endif %}"
        >
          {{ message }}
        </div>
        {% endfor %} {% endif %} {% endwith %}
      </div>

      <form action="#" method="POST" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
          <label
            for="username"
            class="block text-sm font-medium text-slate-700 mb-1.5"
            >Nombre de Usuario</label
          >
          <div class="relative">
            <input
              type="text"
              name="username"
              id="username"
              required
              autofocus
              class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 text-sm"
            />
          </div>
        </div>

        <div>
          <label
            for="password"
            class="block text-sm font-medium text-slate-700 mb-1.5"
            >Contraseña</label
          >
          <input
            type="password"
            name="password"
            id="password"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 text-sm"
            placeholder="••••••••"
          />
        </div>

        <div>
          <button
            type="submit"
            class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all"
          >
            Acceder al Sistema ERP
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
